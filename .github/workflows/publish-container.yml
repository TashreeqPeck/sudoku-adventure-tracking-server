# Build and push the Docker image to GitHub Container Registry on
# every push to main. Semver tags are derived from Conventional Commits.
#
# amd64 and arm64 are built in parallel on native runners (no QEMU). arm64 uses
# GitHub's ubuntu-*-arm image so Pi 5 / aarch64 is compiled natively. The final
# multi-arch manifest is assembled with buildx imagetools. Public repos: free
# arm runners are available; private repos may need larger arm runners or a
# self-hosted aarch64 runner.

name: Publish container

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver_parts.outputs.version }}
      major_minor: ${{ steps.semver_parts.outputs.major_minor }}
      major: ${{ steps.semver_parts.outputs.major }}
      image_name: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semver bump from Conventional Commits
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
            commit_range="HEAD"
          else
            commit_range="${latest_tag}..HEAD"
          fi

          subjects="$(git log ${commit_range} --format=%s)"
          bodies="$(git log ${commit_range} --format=%b)"
          bump="patch"

          if printf '%s\n%s\n' "$subjects" "$bodies" | grep -Eq 'BREAKING CHANGE:'; then
            bump="major"
          elif printf '%s\n' "$subjects" | grep -Eq '^[a-z]+(\([^)]+\))?!:'; then
            bump="major"
          elif printf '%s\n' "$subjects" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          elif printf '%s\n' "$subjects" | grep -Eq '^(fix|perf)(\([^)]+\))?:'; then
            bump="patch"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          next_tag="v${next_version}"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push semver tag
        if: ${{ steps.semver.outputs.bump != 'none' }}
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.semver.outputs.new_tag }}'
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists; skipping tag creation."
            exit 0
          fi
          git tag "${tag}"
          git push origin "${tag}"

      - name: Derive semver image tags
        id: semver_parts
        shell: bash
        run: |
          version='${{ steps.semver.outputs.version }}'
          if [ -z "$version" ]; then
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "major_minor=" >> "$GITHUB_OUTPUT"
            echo "major=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name (GHCR)
        id: image
        run: |
          owner='${{ github.repository_owner }}'
          repo='${{ github.event.repository.name }}'
          echo "name=ghcr.io/${owner,,}/${repo,,}" >> "$GITHUB_OUTPUT"

  build-amd64:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=raw,value=${{ needs.prepare.outputs.major_minor }},enable=${{ needs.prepare.outputs.major_minor != '' }}
            type=raw,value=${{ needs.prepare.outputs.major }},enable=${{ needs.prepare.outputs.major != '' }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          outputs: type=image,name=${{ needs.prepare.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=publish-amd64
          cache-to: type=gha,mode=max,scope=publish-amd64

  build-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=raw,value=${{ needs.prepare.outputs.major_minor }},enable=${{ needs.prepare.outputs.major_minor != '' }}
            type=raw,value=${{ needs.prepare.outputs.major }},enable=${{ needs.prepare.outputs.major != '' }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          outputs: type=image,name=${{ needs.prepare.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=publish-arm64
          cache-to: type=gha,mode=max,scope=publish-arm64

  merge-manifests:
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=raw,value=${{ needs.prepare.outputs.major_minor }},enable=${{ needs.prepare.outputs.major_minor != '' }}
            type=raw,value=${{ needs.prepare.outputs.major }},enable=${{ needs.prepare.outputs.major != '' }}

      - name: Create manifest list and push
        env:
          IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
          TAGS_RAW: ${{ steps.meta.outputs.tags }}
          DIGEST_AMD64: ${{ needs['build-amd64'].outputs.digest }}
          DIGEST_ARM64: ${{ needs['build-arm64'].outputs.digest }}
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r line || [ -n "${line:-}" ]; do
            [ -z "${line:-}" ] && continue
            tag_args+=("-t" "$line")
          done <<< "$TAGS_RAW"
          docker buildx imagetools create "${tag_args[@]}" \
            "${IMAGE_NAME}@${DIGEST_AMD64}" \
            "${IMAGE_NAME}@${DIGEST_ARM64}"
